name: publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-22.04
    environment: pypi

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Check wheel content
        run: |
          unzip -l dist/*.whl | grep "bonesistools/sctools/datasets/datasets.json"
          unzip -l dist/*.whl | grep "bonesistools/databases/ncbi/data/gi/"
          unzip -l dist/*.whl | grep "bonesistools/databases/hcop/data/human_mouse_hcop.tsv.gz"

      - name: Test built wheel
        run: |
          python -m venv /tmp/bonesistools-wheel-test
          source /tmp/bonesistools-wheel-test/bin/activate
          pip install dist/*.whl
          python -c "import bonesistools as bt; print(bt.sct.datasets.info('nestorowa')['cells'])"

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

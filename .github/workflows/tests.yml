name: ci

on:
  push:
  pull_request:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  pyright:
    name: pyright
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install package and pyright
        run: |
          pip install -e ".[all]"
          pip install ipython pyright

      - name: Run pyright
        run: pyright -p .

  reproducibility:
    name: reproducibility (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    env:
      MPLBACKEND: Agg

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux
          - os: macos-15
            label: macOS ARM64
          - os: windows-2022
            label: Windows x64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install package and test dependencies
        run: pip install -r requirements.txt

      - name: Check reproducibility tests
        env:
          BONESISTOOLS_RUN_REPRODUCIBILITY: "1"
        run: >-
          pytest
          tests/reproducibility/test_reproducibility_omnipath.py
          tests/reproducibility/test_reproducibility_boolean_backends.py
          tests/reproducibility/test_reproducibility_stats.py
          tests/reproducibility/test_reproducibility_workflow.py
          -q

  golden:
    name: golden (${{ matrix.label }}, ${{ matrix.mode }})
    runs-on: ${{ matrix.os }}
    env:
      MPLBACKEND: Agg

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux
            mode: strict
            generic_umap: true
          - os: macos-15
            label: macOS ARM64
            mode: portable
            generic_umap: false
          - os: windows-2022
            label: Windows x64
            mode: portable
            generic_umap: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install reference environment
        run: pip install -r requirements.txt

      - name: Check golden tests
        env:
          BONESISTOOLS_RUN_GOLDEN: "1"
          NUMBA_CACHE_DIR: ${{ runner.temp }}/numba-golden-${{ matrix.mode }}
        run: pytest tests/golden -q --golden-mode=${{ matrix.mode }}

      - name: Check generic CPU UMAP golden
        if: matrix.generic_umap
        env:
          BONESISTOOLS_RUN_GOLDEN: "1"
          NUMBA_CPU_NAME: "generic"
          NUMBA_CACHE_DIR: ${{ runner.temp }}/numba-generic
        run: >-
          pytest tests/golden/omics/test_golden_umap_diagnostics.py -q
          --golden-mode=portable

  regression:
    name: ${{ matrix.test-mode }} (${{ matrix.label }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      MPLBACKEND: Agg

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux
            python-version: "3.7"
            test-mode: import
          - os: ubuntu-22.04
            label: Linux
            python-version: "3.8"
            test-mode: import
          - os: ubuntu-22.04
            label: Linux
            python-version: "3.9"
            test-mode: import
          - os: ubuntu-22.04
            label: Linux
            python-version: "3.10"
            test-mode: test
          - os: ubuntu-22.04
            label: Linux
            python-version: "3.11"
            test-mode: test
          - os: ubuntu-22.04
            label: Linux
            python-version: "3.12"
            test-mode: test
          - os: ubuntu-22.04
            label: Linux
            python-version: "3.13"
            test-mode: test
          - os: macos-15
            label: macOS ARM64
            python-version: "3.13"
            test-mode: test
          - os: windows-2022
            label: Windows x64
            python-version: "3.13"
            test-mode: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        if: matrix.test-mode == 'import'
        run: pip install -e .

      - name: Install package with all extras
        if: matrix.test-mode != 'import'
        run: pip install -e ".[all]"

      - name: Install test dependencies
        if: matrix.test-mode != 'import'
        run: pip install pytest

      - name: Check package import
        run: python -c "import bonesistools"

      - name: Run tests
        if: matrix.test-mode == 'test'
        run: pytest tests/regression -q
